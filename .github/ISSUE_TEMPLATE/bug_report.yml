name: Bug report
description: Something in Flang isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings — Input Sources
        2. ...
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: Flang version
      description: About tab — shown as "Version X.X.X (build)"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Apple menu — About This Mac
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, Console.app logs, or other context
    validations:
      required: false
