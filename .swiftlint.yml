# SwiftLint configuration for Flang
# Docs: https://github.com/realm/SwiftLint

# Only lint our own Swift sources.
included:
  - Flang

# Generated assets and bundled resources are not hand-written code.
excluded:
  - Flang/Resources

# Extra rules worth having on beyond the defaults.
opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - fatal_error_message
  - first_where
  - contains_over_first_not_nil
  - unneeded_parentheses_in_closure_argument

# SPEC forbids force operations on system API data — treat them as build errors.
force_cast: error
force_try: error
force_unwrapping:
  severity: error

line_length:
  warning: 120
  error: 200

identifier_name:
  min_length: 2
  excluded:
    - id
